<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title>كتالوج المنتجات</title>

<style>

body{
font-family:Arial;
background:#f4f6f7;
margin:0;
}

header{
background:#0a7c86;
color:white;
text-align:center;
padding:20px;
font-size:24px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
height:170px;
object-fit:contain;
}

.price{
color:#0a7c86;
font-weight:bold;
font-size:18px;
}

.pagination{
text-align:center;
padding:20px;
}

.pagination button{
padding:8px 14px;
margin:4px;
border:none;
background:#0a7c86;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
كتالوج المنتجات
</header>

<div id="products" class="products"></div>

<div id="pagination" class="pagination"></div>


<script>

let products=[]
let perPage=20
let currentPage=1


fetch("products.csv")
.then(r=>r.text())
.then(text=>{

let rows=text.trim().split("\n")

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(";")

if(cols.length<5) continue

let code2=cols[1]
let about=cols[2]
let price=parseFloat(cols[3])
let photo=cols[4]

if(isNaN(price)) continue

products.push({
code2,
about,
price,
photo
})

}

renderPage(1)

})


function renderPage(page){

currentPage=page

let start=(page-1)*perPage
let end=start+perPage

let list=products.slice(start,end)

let html=""

list.forEach(p=>{

html+=`

<div class="card">

<img loading="lazy" src="${p.photo}">

<h4>${p.code2}</h4>

<p>${p.about}</p>

<div class="price">$${p.price}</div>

</div>

`

})

document.getElementById("products").innerHTML=html

renderPagination()

}


function renderPagination(){

let pages=Math.ceil(products.length/perPage)

let html=""

for(let i=1;i<=pages;i++){

html+=`<button onclick="renderPage(${i})">${i}</button>`

}

document.getElementById("pagination").innerHTML=html

}

</script>

</body>
</html>
