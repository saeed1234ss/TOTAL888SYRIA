<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>كتالوج المنتجات</title>

<style>

body{
font-family:Arial;
background:#f3f7f8;
margin:0;
}

header{
background:#0a7c86;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.controls{
padding:20px;
text-align:center;
}

input,select{
padding:10px;
margin:5px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
font-size:18px;
color:#0a7c86;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:#888;
font-size:14px;
}

button{
background:#0a7c86;
color:white;
border:none;
padding:8px 15px;
cursor:pointer;
margin-top:5px;
}

footer{
text-align:center;
padding:20px;
color:#666;
}

.cart{
position:fixed;
top:20px;
left:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>
</head>


<body>

<header>
كتالوج المنتجات
</header>


<div class="controls">

<input id="search" placeholder="بحث عن منتج">

<select id="filter">
<option value="all">كل المنتجات</option>
<option value="total">TOTAL</option>
<option value="wadfow">WADFOW</option>
<option value="expensive">الأعلى سعر</option>
<option value="cheap">الأقل سعر</option>
</select>

</div>


<div class="products" id="products"></div>


<div class="cart">
🛒 سلة: <span id="cartCount">0</span>
</div>


<footer>
by HJY.co
</footer>


<script>

let products=[]
let cart=0
let discount=0
let increase=0.10


function csvToArray(text){

let rows=text.split("\n").map(r=>r.split(","))

let headers=rows[0]

let data=[]

for(let i=1;i<rows.length;i++){

let obj={}

headers.forEach((h,index)=>{
obj[h.trim().toUpperCase()]=rows[i][index]
})

data.push(obj)

}

return data
}


fetch("products.csv")

.then(r=>r.text())

.then(text=>{

let data=csvToArray(text)

data.forEach(p=>{

if(!p.ABOUT)return

let about=p.ABOUT.toLowerCase()

if(about.includes("ملغي") || about.includes("ملغى")) return


let price=parseFloat(p.PRICE)

if(isNaN(price)) return

price=price+(price*increase)

products.push({

code1:p.CODE1,
code2:p.CODE2,
about:p.ABOUT,
photo:p.PHOTO,
price:price,
brand:about.includes("wadfow")?"wadfow":"total"

})

})

render()

})



function render(){

let container=document.getElementById("products")

container.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

let filter=document.getElementById("filter").value


let list=[...products]


if(filter=="total")
list=list.filter(p=>p.brand=="total")

if(filter=="wadfow")
list=list.filter(p=>p.brand=="wadfow")

if(filter=="expensive")
list=list.sort((a,b)=>b.price-a.price)

if(filter=="cheap")
list=list.sort((a,b)=>a.price-b.price)



list=list.filter(p=>p.about.toLowerCase().includes(search))


list.forEach(p=>{

let final=p.price*(1-discount)

let card=`

<div class="card">

<img src="${p.photo}">

<h4>${p.code2}</h4>

<p>${p.about}</p>

<div class="old">$${p.price.toFixed(2)}</div>

<div class="price">$${final.toFixed(2)}</div>

<button onclick="addCart()">اضافة للسلة</button>

</div>

`

container.innerHTML+=card

})

}



function addCart(){

cart++

document.getElementById("cartCount").innerText=cart

}


document.getElementById("search").onkeyup=render
document.getElementById("filter").onchange=render

</script>

</body>
</html>
