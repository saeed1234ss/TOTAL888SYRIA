<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>كتالوج المنتجات</title>

<style>

body{
font-family:Arial;
background:#f5f7f8;
margin:0;
}

header{
background:#0c7f86;
color:white;
padding:15px;
text-align:center;
}

.search{
text-align:center;
padding:15px;
}

.search input{
padding:10px;
width:250px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
height:170px;
object-fit:contain;
}

.price{
color:#0c7f86;
font-weight:bold;
font-size:18px;
}

</style>
</head>

<body>

<header>
كتالوج المنتجات
</header>

<div class="search">
<input id="search" placeholder="بحث">
</div>

<div id="products" class="products"></div>


<script>

let products=[]

fetch("products.csv")
.then(r=>r.text())
.then(text=>{

let rows=text.trim().split("\n")

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(";")

if(cols.length<5) continue

let code1=cols[0]
let code2=cols[1]
let about=cols[2]
let price=parseFloat(cols[3])
let photo=cols[4]

if(isNaN(price)) continue

if(about.includes("ملغي") || about.includes("ملغى")) continue

price=price*1.10

products.push({
code1,
code2,
about,
price,
photo
})

}

render(products)

})

function render(list){

let html=""

list.forEach(p=>{

html+=`

<div class="card">

<img src="${p.photo}">

<h4>${p.code2}</h4>

<p>${p.about}</p>

<div class="price">$${p.price.toFixed(2)}</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}


document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

let filtered=products.filter(p=>
p.about.toLowerCase().includes(q) ||
p.code2.toLowerCase().includes(q)
)

render(filtered)

})

</script>

</body>
</html>
