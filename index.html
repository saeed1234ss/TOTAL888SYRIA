```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>كتالوج المنتجات</title>

<style>

body{
font-family:Tahoma;
margin:0;
background:#eef5f5;
}

header{
background:#159a9c;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#search{
padding:10px;
width:250px;
border:none;
border-radius:5px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
font-size:18px;
color:#159a9c;
font-weight:bold;
}

button{
background:#159a9c;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:.8;
}

.cart{
position:fixed;
left:0;
top:0;
width:260px;
height:100%;
background:white;
border-right:2px solid #ddd;
padding:10px;
overflow:auto;
}

.cart h3{
margin-top:0;
}

.pagination{
text-align:center;
padding:20px;
}

footer{
text-align:center;
padding:15px;
color:#555;
}

.filters{
padding:10px;
text-align:center;
}

.filters button{
margin:5px;
}

</style>

</head>

<body>

<header>

<h2>كتالوج المنتجات</h2>

<input id="search" placeholder="ابحث عن منتج">

</header>

<div class="filters">

<button onclick="showAll()">الكل</button>
<button onclick="filterBrand('total')">TOTAL</button>
<button onclick="filterBrand('wadfow')">WADFOW</button>
<button onclick="sortPrice(true)">الأرخص</button>
<button onclick="sortPrice(false)">الأغلى</button>

</div>

<div class="container" id="products"></div>

<div class="pagination">

<button onclick="prevPage()">السابق</button>
<span id="page"></span>
<button onclick="nextPage()">التالي</button>

</div>

<div class="cart">

<h3>السلة</h3>

<div id="cartItems"></div>

<p>المجموع: $<span id="total">0</span></p>

<button onclick="checkout()">إتمام الطلب</button>

</div>

<footer>

by HJY.co

</footer>

<script>

let products=[]
let filtered=[]
let cart=[]
let page=1
let perPage=20

fetch("products.csv")
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n")

rows.forEach((row,i)=>{

if(i==0)return

let c=row.split(",")

if(!c[3]) return

let about=c[2].toLowerCase()

if(about.includes("ملغي") || about.includes("ملغى")) return

let price=parseFloat(c[3])*1.10

let photo=c[4]

if(photo.includes("https://"))
photo=photo.substring(photo.lastIndexOf("https://"))

products.push({

code1:c[0],
code2:c[1],
about:c[2],
price:price,
photo:photo

})

})

filtered=[...products]

render()

})

function render(){

let start=(page-1)*perPage
let end=start+perPage

let list=filtered.slice(start,end)

let html=""

list.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.photo}">

<h4>${p.code2}</h4>

<p>${p.about}</p>

<p class="price">$${p.price.toFixed(2)}</p>

<button onclick="add(${products.indexOf(p)})">إضافة للسلة</button>

</div>

`

})

document.getElementById("products").innerHTML=html

document.getElementById("page").innerText=
"صفحة "+page+" / "+Math.ceil(filtered.length/perPage)

}

function nextPage(){

if(page<Math.ceil(filtered.length/perPage)){
page++
render()
}

}

function prevPage(){

if(page>1){
page--
render()
}

}

function showAll(){

filtered=[...products]
page=1
render()

}

function filterBrand(name){

filtered=products.filter(p=>
p.about.toLowerCase().includes(name)
)

page=1
render()

}

function sortPrice(low){

filtered.sort((a,b)=> low ? a.price-b.price : b.price-a.price)

page=1
render()

}

document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

filtered=products.filter(p=>
p.about.toLowerCase().includes(q) ||
p.code2.toLowerCase().includes(q)
)

page=1
render()

})

function add(i){

cart.push(products[i])
updateCart()

}

function updateCart(){

let html=""
let total=0

cart.forEach(p=>{

html+=`<p>${p.code2} - $${p.price}</p>`
total+=p.price

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total.toFixed(2)

}

function checkout(){

let name=prompt("الاسم")
let phone=prompt("رقم الهاتف")
let city=prompt("المحافظة")

alert("تم تسجيل الطلب")

}

</script>

</body>

</html>
